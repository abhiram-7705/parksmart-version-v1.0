<nav class="navbar" [class.scrolled]="scrolled">
  <div class="nav-inner">
    <a class="brand" routerLink="/">ParkSmart</a>

    <ul class="nav-links">
      <li *ngFor="let link of navLinks">
        <a class="nav-link"
           [class.active]="link.route === '/' ? isHome() : isActive(link.route)"
           (click)="handleNav(link, $event)"
           href="#">{{ link.label }}</a>
      </li>
    </ul>

    <div class="nav-right">
      <button *ngIf="!isLoggedIn" class="btn btn-primary btn-sm" (click)="openLogin()">Log In</button>

      <div *ngIf="isLoggedIn" class="profile-wrap">
        <button class="profile-btn" (click)="toggleProfile($event)" [class.open]="profileOpen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </button>
        <div class="profile-dropdown" *ngIf="profileOpen">
          <div class="pd-info">
            <div class="pd-name">{{ profile?.userName }}</div>
            <div class="pd-email">{{ profile?.email }}</div>
            <span class="pd-role">{{ profile?.role }}</span>
          </div>
          <div class="pd-sep"></div>
          <button class="pd-item" (click)="goProfile()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            My Profile
          </button>
          <button class="pd-item" (click)="goDashboard()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Dashboard
          </button>
          <div class="pd-sep"></div>
          <button class="pd-item pd-danger" (click)="logout()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
          </button>
        </div>
      </div>

      <div class="hamburger-wrap">
        <button class="hamburger-btn" (click)="toggleMenu($event)" [class.open]="menuOpen">
          <span></span><span></span><span></span>
        </button>
        <div class="hamburger-menu" *ngIf="menuOpen">
          <ng-container *ngFor="let group of hamburgerGroups">
            <div class="hm-section">{{ group.section }}</div>
            <button *ngFor="let item of group.items" class="hm-item" (click)="clickHamburgerItem()">{{ item }}</button>
          </ng-container>
        </div>
      </div>
    </div>
  </div>
</nav>
