<div class="home-page">

    <!-- Left: Illustration -->

          <ellipse cx="130" cy="60" rx="35" ry="20" fill="white" opacity=".9"/>

          <rect x="25" y="130" width="12" height="10" fill="#BFDBFE" rx="2"/>
          <rect x="43" y="130" width="12" height="10" fill="#BFDBFE" rx="2"/>
          <rect x="25" y="150" width="12" height="10" fill="#BFDBFE" rx="2"/>
          <rect x="43" y="150" width="12" height="10" fill="#BFDBFE" rx="2"/>
          <rect x="80" y="80" width="65" height="200" fill="#B0BEC5" rx="4"/>
          <rect x="90" y="65" width="45" height="20" fill="#90A4AE" rx="3"/>
          <rect x="87" y="95" width="14" height="12" fill="#BFDBFE" rx="2"/>
          <rect x="107" y="95" width="14" height="12" fill="#BFDBFE" rx="2"/>
          <rect x="87" y="115" width="14" height="12" fill="#BFDBFE" rx="2"/>
          <rect x="107" y="115" width="14" height="12" fill="#BFDBFE" rx="2"/>
          <rect x="87" y="135" width="14" height="12" fill="#93C5FD" rx="2"/>
          <rect x="380" y="100" width="60" height="180" fill="#CBD5E1" rx="4"/>
          <rect x="393" y="86" width="34" height="18" fill="#94A3B8" rx="3"/>
          <rect x="388" y="115" width="13" height="11" fill="#BFDBFE" rx="2"/>
          <rect x="408" y="115" width="13" height="11" fill="#BFDBFE" rx="2"/>
          <rect x="388" y="135" width="13" height="11" fill="#BFDBFE" rx="2"/>
          <rect x="408" y="135" width="13" height="11" fill="#BFDBFE" rx="2"/>
          <rect x="420" y="120" width="55" height="160" fill="#B0BEC5" rx="4"/>
          <!-- Road -->
          <rect x="0" y="260" width="480" height="80" fill="#475569"/>
          <rect x="0" y="255" width="480" height="10" fill="#334155"/>
          <!-- Road markings -->
          <rect x="40" y="290" width="48" height="6" fill="#FCD34D" rx="3" opacity=".9"/>

          <rect x="220" y="290" width="48" height="6" fill="#FCD34D" rx="3" opacity=".9"/>

          <rect x="207" y="233" width="9" height="14" fill="#111827" rx="2"/>

          <rect x="248" y="228" width="140" height="44" fill="#334155" rx="10"/>
          <rect x="265" y="210" width="100" height="28" fill="#475569" rx="8"/>

          <rect x="270" y="213" width="40" height="22" fill="#BAE6FD" rx="4" opacity=".9"/>
          <rect x="317" y="213" width="40" height="22" fill="#BAE6FD" rx="4" opacity=".9"/>

          <circle cx="278" cy="272" r="18" fill="#1E293B"/>
          <circle cx="278" cy="272" r="10" fill="#64748B"/>
          <circle cx="278" cy="272" r="4" fill="#94A3B8"/>
          <circle cx="358" cy="272" r="18" fill="#1E293B"/>
          <circle cx="358" cy="272" r="10" fill="#64748B"/>
          <circle cx="358" cy="272" r="4" fill="#94A3B8"/>

          <rect x="385" y="238" width="10" height="7" fill="#FDE68A" rx="2"/>
          <rect x="248" y="239" width="8" height="6" fill="#FCA5A5" rx="2"/>

      </div>
    </div>

    <!-- Right: Copy + CTA + Search Card -->
    <div class="hero-content">
      <p class="hero-eyebrow">HOW IT WORKS</p>
      <h1 class="hero-title">
        Users<br>
        Secure Your <span class="text-primary">Parking.</span><br>
        Instant Booking.
      </h1>
      <p class="hero-sub">
        Search a location, choose your time window, and reserve your spot
        in seconds. Your digital pass is ready when you arrive.
      </p>
      <button class="btn btn-primary btn-lg hero-cta" (click)="triggerLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Book Your Space
      </button>

      <!-- Search Card -->
      <div class="search-card">
        <h3 class="search-card-title">Find Your Space</h3>
        <div class="search-grid">

          <!-- Location with autocomplete -->
          <div class="form-group full-col">
            <label class="form-label">Search Parking</label>
            <div class="search-wrap">
              <div class="input-icon-left">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              </div>
              <input
                class="form-control has-icon-left"
                type="text"
                placeholder="Area or landmark (e.g., Marina)"
                [(ngModel)]="searchQuery"
                (input)="onInput()"
                autocomplete="off"/>
              <div class="suggestions" *ngIf="showSuggestions">
                <div *ngFor="let loc of filteredLocations" class="suggestion-item" (mousedown)="selectLocation(loc)">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  {{ loc }}
                </div>
              </div>
            </div>
          </div>

          <!-- Arriving -->
          <div class="form-group">
            <label class="form-label">Arriving</label>
            <input class="form-control" type="datetime-local" [(ngModel)]="arriving"/>
          </div>

          <!-- Leaving -->
          <div class="form-group">
            <label class="form-label">Leaving</label>
            <input class="form-control" type="datetime-local" [(ngModel)]="leaving"/>
          </div>
        </div>

        <button class="btn btn-outline view-all-btn" (click)="triggerLogin()">
          View All Available Spaces
        </button>
      </div>
    </div>
  </section>
</div>
